<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Housing Price Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">🏠 Housing Price Predictor</h1>

    <form id="predictForm" class="space-y-4">
      <div>
        <label class="block text-gray-700">Square Feet</label>
        <input type="number" name="SquareFeet" required
               class="w-full px-3 py-2 border rounded-lg focus:ring focus:ring-blue-300">
      </div>

      <div>
        <label class="block text-gray-700">Bedrooms</label>
        <input type="number" name="Bedrooms" required
               class="w-full px-3 py-2 border rounded-lg focus:ring focus:ring-blue-300">
      </div>

      <div>
        <label class="block text-gray-700">Bathrooms</label>
        <input type="number" name="Bathrooms" required
               class="w-full px-3 py-2 border rounded-lg focus:ring focus:ring-blue-300">
      </div>

      <div>
        <label class="block text-gray-700">Neighborhood</label>
        <input type="text" name="Neighborhood" required
               class="w-full px-3 py-2 border rounded-lg focus:ring focus:ring-blue-300">
      </div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
        Predict Price
      </button>
    </form>

    <!-- Result will be injected here -->
    <div id="resultBox" class="mt-6 p-4 bg-green-100 text-green-800 rounded-lg text-center hidden"></div>
  </div>

  <script>
    const form = document.getElementById("predictForm");
    const resultBox = document.getElementById("resultBox");

    form.addEventListener("submit", async (e) => {
      e.preventDefault(); // stop normal form submission

      const formData = new FormData(form);

      const response = await fetch("/predict", {
        method: "POST",
        body: formData
      });

      const data = await response.json();
      console.log(data);

      resultBox.textContent = data.price;
      resultBox.classList.remove("hidden");
    });
  </script>
</body>
</html>
